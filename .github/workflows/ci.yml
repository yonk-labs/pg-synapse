name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      # pg_synapse_pgrx is excluded for the same reason as the test job:
      # pgrx-pg-sys's build script needs PGRX_HOME (a `cargo pgrx init`
      # artifact). The pgrx-tests.yml workflow runs cargo pgrx init plus
      # the full pgrx test harness for pg15/16/17, so pgrx code is still
      # exercised in CI; it just doesn't go through this workspace-level
      # clippy job.
      - run: cargo clippy --workspace --all-targets --exclude pg_synapse_pgrx -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # pg_synapse_pgrx is excluded here: its tests use #[pg_test] which
      # requires `cargo pgrx test` against a managed Postgres backend (see
      # CLAUDE.md "Testing the pgrx host"). That crate has its own
      # workflow in pgrx-tests.yml which boots Postgres and runs the
      # pgrx test harness for pg15/16/17. Doctests are included by
      # default and exercise the PS-5 conformance doctest from slice 9.
      - run: cargo test --workspace --no-fail-fast --exclude pg_synapse_pgrx
