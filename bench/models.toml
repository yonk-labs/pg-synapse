# bench/models.toml: model registry for the pg_synapse benchmark harness.
# Each [[model]] entry is one row in the leaderboard.
#
# Fields:
#   key           unique slug used in DB names, result keys, and --models filter
#   kind          "remote_openai" | "local_gguf"
#
# remote_openai extras:
#   base_url      OpenAI-compatible chat completions base (no trailing slash)
#   model         model identifier sent in the API request
#   api_key_env   (optional) env-var name holding the API key; omit for no-auth endpoints
#
# local_gguf extras:
#   gguf_repo     HuggingFace repo slug (user/repo)
#   gguf_file     filename inside the repo to download
#   served_model_id  model name to pass in the llama-cpp-server API request
#   chat_format   (optional) --chat_format flag passed to llama-cpp-python server.
#                 Omit to use the model's embedded GGUF jinja template (recommended
#                 for models like Qwen3.5, SmolLM3, gemma-4 that carry their own
#                 tool-call template). The pg_synapse OpenAI provider client has a
#                 content-extraction fallback (Fix B, B6) that parses <tool_call>
#                 blocks from content when the server does not populate tool_calls.
#   server_args   (optional) extra flags appended verbatim to the llama-cpp-python
#                 server launch command (space-separated string).

[[model]]
key           = "openai-gpt5-mini"
kind          = "remote_openai"
base_url      = "https://api.openai.com/v1"
model         = "gpt-5-mini"
api_key_env   = "OPENAI_API_KEY"

[[model]]
key           = "vllm-qwen3-coder"
kind          = "remote_openai"
base_url      = "http://192.168.1.193:8000/v1"
model         = "Intel/Qwen3-Coder-Next-int4-AutoRound"
# No api_key_env: local vLLM endpoint, no auth required.

[[model]]
key           = "gemma-4-E2B-it"
kind          = "local_gguf"
gguf_repo     = "unsloth/gemma-4-E2B-it-GGUF"
